name: Actualizar UF

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4
        
      - name: Run Scraper
        run: python scraper.py
        
      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add uf_data.json
          git diff --cached --quiet || (git commit -m "Actualiza datos de la UF $(date -u +%Y-%m-%d)" && git push)
